<div class="form_container form">
  <h3>Forgot your password?</h3>
  <input
    type="email"
    placeholder="Enter your registered email"
    [(ngModel)]="email"
    name="recoveryEmail"
    class="form-control"
  />
  <button (click)="recover()" class="btn btn-outline-primary">Recover password</button>
</div>
